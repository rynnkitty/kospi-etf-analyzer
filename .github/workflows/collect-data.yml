name: Collect Data

on:
  # 매일 KST 18:00 (UTC 09:00) 실행 — 장 마감 후 데이터 수집
  schedule:
    - cron: '0 9 * * 1-5'
  # 수동 트리거 (테스트 또는 즉시 갱신)
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 데이터 파일 커밋/푸시 권한
      actions: write    # deploy.yml 워크플로우 트리거 권한

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      # ── 1단계: ETF 목록 수집 ─────────────────────────────────────
      - name: Collect ETF list
        working-directory: scripts
        run: python collect_etf_list.py

      # ── 2단계: ETF 보유종목 수집 ─────────────────────────────────
      - name: Collect ETF holdings
        working-directory: scripts
        run: python collect_holdings.py

      # ── 3단계: 종목 밸류에이션 수집 (PER/PBR) ────────────────────
      - name: Collect stock valuation
        working-directory: scripts
        run: python collect_valuation.py

      # ── 4단계: 데이터 검증 + metadata.json 생성 ──────────────────
      - name: Merge and validate data
        working-directory: scripts
        run: python merge_data.py

      # ── 5단계: 변경된 JSON 파일 커밋 및 푸시 ────────────────────
      - name: Commit data files
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          if git diff --staged --quiet; then
            echo "데이터 변경 없음 — 커밋 건너뜀"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "data: 자동 데이터 수집 $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST')"
            git push
            echo "데이터 업데이트 완료"
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

      # ── 6단계: 데이터 변경 시 배포 워크플로우 트리거 ───────────
      - name: Trigger deploy workflow
        if: steps.commit.outputs.pushed == 'true'
        run: gh workflow run deploy.yml --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
